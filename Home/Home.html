<!DOCTYPE html>
<html>
<head>
    <title>Horror Game</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        
        #videoBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
        }

        video {
            width: 100%;
            border-radius: 10px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>The Roundtable After Dark</h1>
    <p>Click anywhere to begin...</p>

    
    <div id="videoBox">
        <video autoplay muted loop>
            <source src="video/horror.mp4" type="video/mp4">
        </video>
    </div>

    
    <audio id="horrorSound" loop>
        <source src="audio/horror.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.body.addEventListener("click", function () {
            let audio = document.getElementById("horrorSound");
            audio.play();
        }, { once: true });
    </script>

</body>
</html>
